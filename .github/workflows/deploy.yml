name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      refresh_target_session_now:
        description: "Invoke the AWS Target session refresh Lambda after deploy"
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
      TF_VAR_github_repository: ${{ github.repository }}
      TF_VAR_alert_recipient_email: ${{ vars.ALERT_RECIPIENT_EMAIL }}
      TF_VAR_email_footer_gif_url: ${{ vars.EMAIL_FOOTER_GIF_URL || 'https://www.gifcen.com/wp-content/uploads/2023/03/-8.gif' }}
      TF_VAR_checkout_webhook_url: ${{ vars.CHECKOUT_WEBHOOK_URL }}
      TF_VAR_target_place_order_enabled: ${{ vars.TARGET_PLACE_ORDER_ENABLED || 'false' }}
      TF_VAR_target_session_refresh_enabled: ${{ vars.TARGET_SESSION_REFRESH_ENABLED || 'true' }}
      TF_VAR_target_session_refresh_schedule_expression: ${{ vars.TARGET_SESSION_REFRESH_SCHEDULE_EXPRESSION || 'cron(45 6,7 * * ? *)' }}
      TF_VAR_target_session_verify_url: ${{ vars.TARGET_SESSION_VERIFY_URL }}
      TF_VAR_target_checkout_browser_enabled: ${{ vars.TARGET_CHECKOUT_BROWSER_ENABLED || 'true' }}
      TF_VAR_target_checkout_browser_instance_type: ${{ vars.TARGET_CHECKOUT_BROWSER_INSTANCE_TYPE || 't3a.small' }}
      TF_VAR_target_checkout_browser_volume_size: ${{ vars.TARGET_CHECKOUT_BROWSER_VOLUME_SIZE || '20' }}
      CHECKOUT_WEBHOOK_URL: ${{ vars.CHECKOUT_WEBHOOK_URL }}
      POKETRACKER_MANAGED_CHECKOUT_WEBHOOK: "true"
      TF_VAR_image_tag: latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        env:
          UV_CACHE_DIR: .uv-cache
        run: uv sync --extra dev

      - name: Run tests
        env:
          UV_CACHE_DIR: .uv-cache
        run: uv run pytest

      - name: Validate watchlist
        env:
          UV_CACHE_DIR: .uv-cache
        run: uv run poketracker-validate-watchlist --file watchlist.yaml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/main
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=poketracker/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TERRAFORM_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Preserve checkout webhook image for base infra
        working-directory: infra/main
        shell: bash
        run: |
          checkout_webhook_repository_url="$(terraform output -raw checkout_webhook_ecr_repository_url 2>/dev/null || true)"
          checkout_webhook_repository_name="${checkout_webhook_repository_url##*/}"

          if [ -n "$checkout_webhook_repository_url" ] &&
             aws ecr describe-images \
               --repository-name "$checkout_webhook_repository_name" \
               --image-ids imageTag=latest \
               --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "TF_VAR_checkout_webhook_image_uri=${checkout_webhook_repository_url}:latest" >> "$GITHUB_ENV"
          fi

      - name: Terraform apply base infra
        working-directory: infra/main
        run: terraform apply -auto-approve

      - name: Read ECR repository URL
        id: ecr
        working-directory: infra/main
        run: |
          echo "repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "checkout_webhook_repository_url=$(terraform output -raw checkout_webhook_ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Export app table names
        working-directory: infra/main
        run: |
          echo "CONFIG_TABLE_NAME=$(terraform output -raw config_table_name)" >> "$GITHUB_ENV"
          echo "AUDIT_TABLE_NAME=$(terraform output -raw audit_table_name)" >> "$GITHUB_ENV"
          echo "STATE_TABLE_NAME=$(terraform output -raw state_table_name)" >> "$GITHUB_ENV"
          echo "CHECKOUT_WEBHOOK_URL=$(terraform output -raw effective_checkout_webhook_url)" >> "$GITHUB_ENV"

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          docker build -t "${{ steps.ecr.outputs.repository_url }}:${{ github.sha }}" -t "${{ steps.ecr.outputs.repository_url }}:latest" .
          docker push "${{ steps.ecr.outputs.repository_url }}:${{ github.sha }}"
          docker push "${{ steps.ecr.outputs.repository_url }}:latest"
          echo "TF_VAR_image_tag=${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Build and push checkout webhook image
        run: |
          docker build -f Dockerfile.checkout-webhook -t "${{ steps.ecr.outputs.checkout_webhook_repository_url }}:${{ github.sha }}" -t "${{ steps.ecr.outputs.checkout_webhook_repository_url }}:latest" .
          docker push "${{ steps.ecr.outputs.checkout_webhook_repository_url }}:${{ github.sha }}"
          docker push "${{ steps.ecr.outputs.checkout_webhook_repository_url }}:latest"
          echo "TF_VAR_checkout_webhook_image_uri=${{ steps.ecr.outputs.checkout_webhook_repository_url }}:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Terraform apply image tag
        working-directory: infra/main
        run: terraform apply -auto-approve

      - name: Refresh Target session now
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_target_session_now }}
        working-directory: infra/main
        shell: bash
        run: |
          function_name="$(terraform output -raw target_session_refresh_function_name)"
          if [ -z "$function_name" ]; then
            echo "Target session refresh function is not enabled; skipping."
            exit 0
          fi
          aws lambda invoke \
            --function-name "$function_name" \
            --cli-binary-format raw-in-base64-out \
            --payload '{}' \
            target-session-refresh-response.json
          cat target-session-refresh-response.json

      - name: Sync watchlist to DynamoDB
        env:
          UV_CACHE_DIR: .uv-cache
        run: uv run poketracker-sync-watchlist --file watchlist.yaml
