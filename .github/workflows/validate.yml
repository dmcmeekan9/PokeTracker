name: validate

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        env:
          UV_CACHE_DIR: .uv-cache
        run: uv sync --extra dev

      - name: Run tests
        env:
          UV_CACHE_DIR: .uv-cache
        run: uv run pytest

      - name: Validate watchlist
        env:
          UV_CACHE_DIR: .uv-cache
          CHECKOUT_WEBHOOK_URL: ${{ vars.CHECKOUT_WEBHOOK_URL }}
          POKETRACKER_MANAGED_CHECKOUT_WEBHOOK: "true"
        run: uv run poketracker-validate-watchlist --file watchlist.yaml --skip-url-check
